# Reverse proxy sketch — terminate TLS upstream of Next.js + Fastify
upstream watchdog_web {
  server host.docker.internal:3000;
}

upstream watchdog_api {
  server host.docker.internal:4000;
}

server {
  listen 443 ssl http2;
  server_name watchdog.example;

  ssl_certificate     /etc/ssl/certs/watchdog.crt;
  ssl_certificate_key /etc/ssl/private/watchdog.key;

  location /api/ {
    proxy_pass http://watchdog_api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location / {
    proxy_pass http://watchdog_web;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection upgrade;
    proxy_set_header Host $host;
  }
}
